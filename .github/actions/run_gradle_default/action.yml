# Usage:
# - name: Run gradle default
#   uses: ./.github/actions/run_gradle_default
#   with:
#     key: "cache_key"
#     gradle_command: ->
#       :exampleGradleTask

name: run_gradle
description: Run gradle
inputs:
  key:
    required: true
    description: primary cache key
  gradle_command:
    required: true
    description: part of gradle command including tasks && properties
runs:
  using: composite
  steps:
    - name: Setup java
      uses: VladislavSumin/vs-core/.github/actions/setup_java@master

    - name: Gradle cache
      uses: VladislavSumin/vs-core/.github/actions/gradle_cache@master
      with:
        key: ${{ inputs.key }}

    - name: Run gradle
      uses: VladislavSumin/vs-core/.github/actions/run_gradle@master
      with:
        working-directory: ./vs-qa
        gradle_command: ${{ inputs.gradle_command }}
